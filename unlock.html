<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解锁页面</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #f5f5f5; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px; }
    .fix { background: #67C23A; color: white; border: none; border-radius: 8px; }
    .reload { background: #409EFF; color: white; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>解锁工具</h1>
  <p>如果页面被遮罩层锁定，点击下方按钮解锁：</p>
  <button class="fix" onclick="fixPage()">🔓 解锁页面</button>
  <button class="reload" onclick="location.reload()">🔄 刷新页面</button>

  <script>
    function fixPage() {
      // 移除所有遮罩层
      document.querySelectorAll('.el-loading-mask, .el-overlay, .v-modal, .el-message-box__wrapper').forEach(el => el.remove());
      // 恢复 body 样式
      document.body.style.overflow = 'auto';
      document.body.style.position = 'static';
      document.body.style.paddingRight = '0';
      // 关闭所有 el-dialog
      document.querySelectorAll('.el-dialog__wrapper').forEach(el => el.remove());
      alert('页面已解锁！');
    }
  </script>
</body>
</html>
